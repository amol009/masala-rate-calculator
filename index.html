<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Masala Rate Calculator</title>
<style>
*{box-sizing:border-box;font-family:Segoe UI,Arial,sans-serif}
body{margin:0;background:#f4f7fb;padding:12px;color:#1e293b}
.container{max-width:1200px;margin:auto;background:#fff;padding:20px;border-radius:20px;box-shadow:0 8px 24px rgba(0,0,0,.08)}
h1{text-align:center;margin:0 0 20px;font-size:2.2rem}
.top{display:flex;gap:12px;flex-wrap:wrap;align-items:end}
input[type=text],input[type=number]{width:100%;padding:12px;border:1px solid #dbe3ee;border-radius:12px}
button{border:none;border-radius:12px;padding:12px 16px;color:#fff;cursor:pointer}
.add-btn{background:#2563eb}
.info-btn{background:#64748b}
.delete-btn{background:#ef4444}
table{width:100%;border-collapse:collapse;margin-top:16px}
th,td{padding:12px;border-bottom:1px solid #e5e7eb;text-align:center}
th{background:#f8fafc}
.profit,.sell{display:inline-flex;align-items:center;justify-content:center;min-width:90px;height:40px;border-radius:10px;font-weight:600}
.profit{background:#ecfdf5;color:#15803d}
.sell{background:#eff6ff;color:#1d4ed8}
.summary{display:flex;gap:12px;flex-wrap:wrap;margin-top:20px}
.card{flex:1;min-width:220px;border:1px solid #e5e7eb;border-radius:14px;padding:16px}
.modal{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5)}
.modal-box{background:#fff;width:340px;max-width:95%;margin:60px auto;padding:20px;border-radius:16px}

@media(max-width:768px){
 h1{font-size:2rem}
 .top,.summary{flex-direction:column}
 table,thead,tbody,tr,td{display:block;width:100%}
 thead{display:none}
 tbody{display:flex;flex-direction:column;gap:14px}
 tr{background:#fff;border:1px solid #e5e7eb;border-radius:16px;padding:16px;box-shadow:0 2px 8px rgba(0,0,0,.05)}
 td{border:none;padding:8px 0;text-align:left}
 td::before{display:block;font-weight:700;color:#475569;margin-bottom:6px}
 td:nth-child(1)::before{content:"Item"}
 td:nth-child(2)::before{content:"Purchase Rate"}
 td:nth-child(3)::before{content:"Profit %"}
 td:nth-child(4)::before{content:"Profit"}
 td:nth-child(5)::before{content:"Selling"}
 td:nth-child(6)::before{content:"Details"}
 td:nth-child(7)::before{content:"Actions"}
 .action-wrap{display:flex;gap:10px}
 .action-wrap button{flex:1}
}
</style>
</head>
<body>
<div class="container">
<h1>Masala Rate Calculator</h1>

<div class="top">
<div>
<label><input type="radio" name="mode" value="global" checked> Global</label>
<label><input type="radio" name="mode" value="individual"> Individual</label>
</div>
<div>
<label>Global Profit %</label>
<input id="globalProfit" type="number" value="20">
</div>
<div><button class="add-btn" onclick="addRow()">+ Add Item</button></div>
</div>

<table>
<thead><tr><th>Item</th><th>Purchase</th><th>Profit %</th><th>Profit</th><th>Selling</th><th>Details</th><th>Actions</th></tr></thead>
<tbody id="tableBody"></tbody>
</table>

<div class="summary">
<div class="card"><h3>Total Items</h3><h2 id="totalItems">0</h2></div>
<div class="card"><h3>Average Profit %</h3><h2 id="avgProfit">0%</h2></div>
<div class="card"><h3>Total Profit</h3><h2 id="totalProfit">₹0</h2></div>
</div>
</div>

<div class="modal" id="modal">
<div class="modal-box">
<h3 id="mTitle"></h3><br>
<div id="mBody"></div><br>
<button class="add-btn" onclick="modal.style.display='none'">Close</button>
</div>
</div>

<script>
const tbody=document.getElementById('tableBody');

function addRow(name='',rate=''){
 const tr=document.createElement('tr');
 tr.innerHTML=`
 <td><input type="text" value="${name}"></td>
 <td><input class="purchase" type="number" value="${rate}"></td>
 <td><input class="profitPercent" type="number" value="20"></td>
 <td><span class="profit">₹0.00</span></td>
 <td><span class="sell">₹0.00</span></td>
 <td><button class="info-btn" onclick="showInfo(this)">Details</button></td>
 <td><div class="action-wrap"><button class="delete-btn" onclick="this.closest('tr').remove();calc()">Delete</button></div></td>`;
 tbody.appendChild(tr);
 tr.querySelectorAll('input').forEach(i=>i.addEventListener('input',calc));
 calc();
}

function showInfo(btn){
 const tr=btn.closest('tr');
 const item=tr.querySelector('input[type=text]').value||'Item';
 const sell=parseFloat(tr.querySelector('.sell').textContent.replace('₹',''))||0;
 mTitle.textContent=item;
 mBody.innerHTML=`
 <p>1 Kg : ₹${sell.toFixed(2)}</p>
 <p>500 gm : ₹${(sell*0.5).toFixed(2)}</p>
 <p>250 gm : ₹${(sell*0.25).toFixed(2)}</p>
 <p>200 gm : ₹${(sell*0.20).toFixed(2)}</p>
 <p>100 gm : ₹${(sell*0.10).toFixed(2)}</p>`;
 modal.style.display='block';
}

function calc(){
 const mode=document.querySelector('input[name=mode]:checked').value;
 const gp=parseFloat(globalProfit.value)||0;
 let c=0,tp=0,pp=0;

 document.querySelectorAll('#tableBody tr').forEach(tr=>{
   const purchase=parseFloat(tr.querySelector('.purchase').value)||0;
   const pInput=tr.querySelector('.profitPercent');
   const p=mode==='global'?gp:(parseFloat(pInput.value)||0);
   pInput.disabled=(mode==='global');
   if(mode==='global') pInput.value=gp;
   const profit=purchase*p/100;
   const sell=purchase+profit;
   tr.querySelector('.profit').textContent='₹'+profit.toFixed(2);
   tr.querySelector('.sell').textContent='₹'+sell.toFixed(2);
   c++; tp+=profit; pp+=p;
 });

 totalItems.textContent=c;
 avgProfit.textContent=c?(pp/c).toFixed(1)+'%':'0%';
 totalProfit.textContent='₹'+tp.toFixed(2);
}

globalProfit.oninput=calc;
document.querySelectorAll('input[name=mode]').forEach(x=>x.onchange=calc);

['Kanda Lasun Masala','Kala Masala','Malvani Masala','Kashmiri Mirchi Powder','Tikhat Mirchi Powder','Bedgi Mirchi Powder','Halad Powder'].forEach(x=>addRow(x,''));
</script>
</body>
</html>
