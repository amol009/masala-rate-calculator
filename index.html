
<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Masala Rate Calculator Pro</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Segoe UI, Arial, sans-serif
        }

        body {
            background: #f8fafc;
            padding: 24px;
            color: #334155
        }

        .container {
            max-width: 1200px;
            margin: auto;
            background: #fff;
            padding: 24px;
            border-radius: 16px;
            box-shadow: 0 8px 24px rgba(0, 0, 0, .08)
        }

        h1 {
            margin-bottom: 6px
        }

        .subtitle {
            color: #64748b;
            margin-bottom: 20px
        }

        .settings-card {
            background: #f8fafc;
            border: 1px solid #e2e8f0;
            padding: 16px;
            border-radius: 12px;
            margin-bottom: 20px
        }

        .radio-group {
            display: flex;
            gap: 20px;
            margin: 12px 0
        }

        input[type=text],
        input[type=number] {
            width: 100%;
            padding: 10px;
            border: 1px solid #cbd5e1;
            border-radius: 8px
        }

        button {
            border: none;
            background: #2563eb;
            color: #fff;
            padding: 10px 16px;
            border-radius: 8px;
            cursor: pointer
        }

        button:hover {
            opacity: .9
        }

        .toolbar {
            display: flex;
            gap: 10px;
            align-items: end;
            flex-wrap: wrap
        }

        table {
            width: 100%;
            margin-top: 20px;
            border-collapse: separate;
            border-spacing: 0
        }

        th {
            background: #f8fafc;
            color: #334155;
            padding: 14px;
            border-bottom: 2px solid #e2e8f0
        }

        td {
            padding: 12px;
            border-bottom: 1px solid #e5e7eb;
            text-align: center
        }

        .profit-value {
            display: inline-block;
            background: #ecfdf5;
            color: #15803d;
            padding: 6px 12px;
            border-radius: 8px;
            font-weight: 600
        }

        .selling-price {
            display: inline-block;
            background: #eff6ff;
            color: #1d4ed8;
            padding: 6px 12px;
            border-radius: 8px;
            font-weight: 600
        }

        .delete-btn {
            background: #dc2626
        }

        .summary {
            display: flex;
            gap: 16px;
            margin-top: 20px;
            flex-wrap: wrap
        }

        .summary-card {
            flex: 1;
            min-width: 220px;
            background: #fff;
            border: 1px solid #e2e8f0;
            padding: 16px;
            border-radius: 12px
        }

        .summary-card h2 {
            margin-top: 8px
        }

        .dark {
            background: #0f172a;
            color: #e2e8f0
        }

        .dark .container,
        .dark .summary-card {
            background: #1e293b
        }

        .dark .settings-card,
        .dark th {
            background: #334155;
            color: #fff
        }
    </style>
</head>

<body>
    <div class="container">
        <h1>Masala Rate Calculator Pro</h1>
        <p class="subtitle">Wholesale to Supplier Selling Price Calculator</p>

        <div class="settings-card">
            <div class="radio-group">
                <label><input type="radio" name="mode" value="global" checked> Global Profit %</label>
                <label><input type="radio" name="mode" value="individual"> Individual Profit %</label>
            </div>

            <div class="toolbar">
                <div>
                    <label>Global Profit %</label>
                    <input type="number" id="globalProfit" value="20">
                </div>
                <button onclick="addRow()">+ Add Item</button>
                <button onclick="toggleTheme()">🌙 Theme</button>
            </div>
        </div>

        <table>
            <thead>
                <tr>
                    <th>Item</th>
                    <th>Purchase Rate</th>
                    <th>Profit %</th>
                    <th>Profit ₹</th>
                    <th>Selling ₹</th>
                    <th>Action</th>
                </tr>
            </thead>
            <tbody id="tableBody"></tbody>
        </table>

        <div class="summary">
            <div class="summary-card">
                <h3>Total Items</h3>
                <h2 id="totalItems">0</h2>
            </div>
            <div class="summary-card">
                <h3>Average Profit %</h3>
                <h2 id="avgProfit">0%</h2>
            </div>
            <div class="summary-card">
                <h3>Total Expected Profit</h3>
                <h2 id="totalProfit">₹0</h2>
            </div>
        </div>
    </div>

    <script>
        const tableBody = document.getElementById('tableBody');

        function saveData() {
            localStorage.setItem('data', tableBody.innerHTML);
        }

        function addRow(name = '', rate = '') {
            const row = document.createElement('tr');
            row.innerHTML = `
<td><input type="text" value="${name}" placeholder="Item"></td>
<td><input type="number" class="purchase-rate" value="${rate}"></td>
<td><input type="number" class="item-profit" value="20"></td>
<td><span class="profit-value">₹0</span></td>
<td><span class="selling-price">₹0</span></td>
<td><button class="delete-btn">Delete</button></td>`;

            tableBody.appendChild(row);

            row.querySelectorAll('input').forEach(i => i.addEventListener('input', calculateAll));
            row.querySelector('.delete-btn').addEventListener('click', () => { row.remove(); calculateAll(); });
            calculateAll();
        }

        function calculateAll() {
            const mode = document.querySelector('input[name="mode"]:checked').value;
            const globalProfit = parseFloat(document.getElementById('globalProfit').value) || 0;

            let count = 0, totalPercent = 0, totalProfitAmt = 0;

            document.querySelectorAll('#tableBody tr').forEach(row => {
                const purchase = parseFloat(row.querySelector('.purchase-rate').value) || 0;
                const itemProfitInput = row.querySelector('.item-profit');

                const profitPercent = mode === 'global' ? globalProfit : (parseFloat(itemProfitInput.value) || 0);

                itemProfitInput.disabled = (mode === 'global');
                itemProfitInput.value = profitPercent;

                const profit = purchase * profitPercent / 100;
                const selling = purchase + profit;

                row.querySelector('.profit-value').textContent = '₹' + profit.toFixed(2);
                row.querySelector('.selling-price').textContent = '₹' + selling.toFixed(2);

                count++;
                totalPercent += profitPercent;
                totalProfitAmt += profit;
            });

            document.getElementById('totalItems').textContent = count;
            document.getElementById('avgProfit').textContent = count ? (totalPercent / count).toFixed(1) + '%' : '0%';
            document.getElementById('totalProfit').textContent = '₹' + totalProfitAmt.toFixed(2);

            saveData();
        }

        function toggleTheme() {
            document.body.classList.toggle('dark');
        }

        document.getElementById('globalProfit').addEventListener('input', calculateAll);
        document.querySelectorAll('input[name="mode"]').forEach(r => r.addEventListener('change', calculateAll));

        ['Kanda Lasun Masala', 'Kala Masala', 'Malvani Masala', 'Kashmiri Mirchi Powder', 'Tikhat Mirchi Powder', 'Bedgi Mirchi Powder', 'Halad Powder']
            .forEach(x => addRow(x, ''));
    </script>
</body>

</html>
